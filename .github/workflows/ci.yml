name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Run unit tests
        run: uv run --extra dev pytest tests/ -v --tb=short

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Bootstrap Firefly III
        run: ./integration/bootstrap.sh

      - name: Run integration tests
        run: uv run --extra dev pytest integration/test_mcp_tools.py -v --tb=short

      - name: Dump Firefly III logs on failure
        if: failure()
        run: |
          docker compose -f integration/docker-compose.yml logs app
          docker compose -f integration/docker-compose.yml logs db

      - name: Teardown
        if: always()
        run: docker compose -f integration/docker-compose.yml down -v --remove-orphans
